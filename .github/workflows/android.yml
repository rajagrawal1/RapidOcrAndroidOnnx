name: Build & Publish AAR

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ '*.*.*' ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ONNX_VERSION: "1.23.2"
      ONNX_ASSET: "onnxruntime-v1.23.2-android-shared.7z"
      OPENCV_ASSET: "opencv-mobile-3.4.15-android.7z"
      OPENCV_URL: "https://github.com/benjaminwan/OcrLiteAndroidNcnn/releases/download/1.0.0.20201007/opencv-mobile-3.4.15-android.7z"
      MODEL_ASSET: "RapidOcrOnnxModel-v3.7z"
      MODEL_URL: "https://github.com/RapidAI/RapidOcrAndroidOnnx/releases/download/1.0.1/RapidOcrOnnxModel-v3.7z"
      ABIS: "arm64-v8a armeabi-v7a x86 x86_64"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up NDK r27c
        id: setup_ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install CMake 3.22.1
        run: |
          sdkmanager --install "cmake;3.22.1" >/dev/null 2>&1 || true

      - name: Download OpenCV-mobile 3.4.15
        run: |
          wget -q "$OPENCV_URL" -O "$OPENCV_ASSET"
          7z x -y "$OPENCV_ASSET" >/dev/null
          rm -rf OcrLibrary/src/sdk
          mv opencv-mobile-3.4.15-android/sdk OcrLibrary/src/sdk

      - name: Download OnnxRuntime ${{ env.ONNX_VERSION }} prebuilts
        run: |
          wget -q "https://github.com/RapidAI/OnnxruntimeBuilder/releases/download/${ONNX_VERSION}/${ONNX_ASSET}" -O "$ONNX_ASSET"
          7z x -y "$ONNX_ASSET" >/dev/null
          # New OnnxruntimeBuilder layout: onnxruntime-android-shared/<abi>/{include,lib}
          rm -rf OcrLibrary/src/main/onnxruntime-shared
          mkdir -p OcrLibrary/src/main/onnxruntime-shared
          for abi in $ABIS; do
            cp -r "onnxruntime-android-shared/$abi" "OcrLibrary/src/main/onnxruntime-shared/"
          done

      - name: Stage libonnxruntime.so into jniLibs (packaging)
        run: |
          for abi in $ABIS; do
            mkdir -p "OcrLibrary/src/main/jniLibs/$abi"
            cp "OcrLibrary/src/main/onnxruntime-shared/$abi/lib/libonnxruntime.so" "OcrLibrary/src/main/jniLibs/$abi/"
          done

      - name: Download PP-OCRv3 models
        run: |
          wget -q "$MODEL_URL" -O "$MODEL_ASSET"
          7z x -y "$MODEL_ASSET" >/dev/null
          rm -rf OcrLibrary/src/main/assets
          mv assets OcrLibrary/src/main/assets

      - name: Build AAR (4 ABIs)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup_ndk.outputs.ndk-path }}
        run: chmod +x gradlew && ./gradlew :OcrLibrary:assembleRelease --no-daemon

      - name: 16 KB alignment gate (arm64-v8a, x86_64)
        run: |
          set -e
          AAR=$(find OcrLibrary/build/outputs/aar -name '*release.aar' | head -1)
          echo "AAR: $AAR"
          rm -rf /tmp/aarch && mkdir /tmp/aarch && unzip -q "$AAR" -d /tmp/aarch
          fail=0
          for abi in arm64-v8a x86_64; do
            for so in /tmp/aarch/jni/$abi/*.so; do
              [ -f "$so" ] || continue
              align=$(readelf -lW "$so" | awk '/^  LOAD/{print $NF}' | sort -u | tr '\n' ' ')
              printf '%-40s LOAD p_align = {%s}\n' "$abi/$(basename $so)" "$align"
              case "$align" in *0x1000*) echo "  ❌ 4 KB segment — BLOCKER"; fail=1 ;; *) echo "  ✅ 16 KB" ;; esac
            done
          done
          exit $fail

      - name: Compute AAR SHA-256
        id: sha
        run: |
          AAR=$(find OcrLibrary/build/outputs/aar -name '*release.aar' | head -1)
          sha=$(sha256sum "$AAR" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
          echo "## AAR SHA-256" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$sha" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to GitHub Packages
        run: ./gradlew :OcrLibrary:publish --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapidocr-onnx-android-aar
          path: OcrLibrary/build/outputs/aar/*-release.aar
